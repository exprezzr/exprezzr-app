<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capi Taxi - Digital Card</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
        }
        .card-container {
            background: rgba(17, 17, 17, 0.95);
            border: 2px solid #f4d03f;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            max-width: 380px;
            width: 90%;
            box-shadow: 0 0 40px rgba(244, 208, 63, 0.15);
            position: relative;
            backdrop-filter: blur(10px);
        }
        .card-logo {
            width: 120px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(244, 208, 63, 0.2));
        }
        .card-title {
            font-family: 'Orbitron', sans-serif;
            color: #f4d03f;
            font-size: 2rem;
            margin: 0;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(244, 208, 63, 0.3);
        }
        .card-subtitle {
            color: #aaa;
            font-size: 0.85rem;
            margin-top: 5px;
            margin-bottom: 35px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 300;
        }
        .card-info {
            text-align: left;
            margin-bottom: 35px;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 15px;
        }
        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            color: #ddd;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }
        .info-item:last-child {
            margin-bottom: 0;
        }
        .info-item:hover {
            color: #f4d03f;
            transform: translateX(5px);
        }
        .info-icon {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            fill: #f4d03f;
            flex-shrink: 0;
        }
        .btn-action {
            display: block;
            width: 100%;
            padding: 16px;
            background: #f4d03f;
            color: #000;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            border-radius: 50px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 2px solid #f4d03f;
            box-sizing: border-box;
        }
        .btn-action:hover {
            background: #fff;
            border-color: #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: transparent;
            color: #f4d03f;
        }
        .btn-secondary:hover {
            background: rgba(244, 208, 63, 0.1);
            border-color: #f4d03f;
            color: #fff;
            box-shadow: 0 0 20px rgba(244, 208, 63, 0.2);
        }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
        }
        .social-icon {
            width: 24px;
            height: 24px;
            fill: #888;
            transition: fill 0.3s;
        }
        .social-icon:hover {
            fill: #f4d03f;
        }
    </style>
</head>
<body>
    <div class="card-container">
        <img src="/images/logo-exprezzr.webp" alt="Capi Taxi Logo" class="card-logo">
        <h1 class="card-title">CAPI TAXI</h1>
        <p class="card-subtitle">Premium Transportation</p>

                <span>(201) 551-2020</span>

    </div>
</body>
</html>
