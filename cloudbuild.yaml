steps:
  # 1. Construir la imagen
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/exprezzr-repo/exprezzr-app', '.']

  # 2. Subir a Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/exprezzr-repo/exprezzr-app']

  # 3. Desplegar en Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'exprezzr-app'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/exprezzr-repo/exprezzr-app'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'